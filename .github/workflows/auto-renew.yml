name: Auto Renew

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            chromium-chromedriver \
            xvfb \
            libxss1 \
            libxtst6 \
            libgtk-3-0 \
            libgbm1

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install selenium undetected-chromedriver==3.5.5

      - name: Run renewal script
        env:
          HEADLESS_MODE: "true"
        run: |
          xvfb-run -a python auto_renew.py
